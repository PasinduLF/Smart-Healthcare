apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: JWT_SECRET
          value: "supersecret_key"
        # We would list the other service URLs here, assuming K8s DNS (e.g., http://patient-service:3001)
        - name: PATIENT_SERVICE_URL
          value: "https://smart-healthcare-lckn.onrender.com"
        - name: DOCTOR_SERVICE_URL
          value: "http://doctor-service:3002"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:3003"
        - name: TELEMEDICINE_SERVICE_URL
          value: "http://telemedicine-service:3004"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:3005"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:3006"
        - name: AI_SERVICE_URL
          value: "http://ai-service:3007"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-deployment
spec:
  replicas: 1
  selector: { matchLabels: { app: patient-service } }
  template:
    metadata: { labels: { app: patient-service } }
    spec:
      containers:
      - name: patient-service
        image: patient-service:latest
        imagePullPolicy: Never
        ports: [{ containerPort: 3001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-deployment
spec:
  replicas: 1
  selector: { matchLabels: { app: doctor-service } }
  template:
    metadata: { labels: { app: doctor-service } }
    spec:
      containers:
      - name: doctor-service
        image: doctor-service:latest
        imagePullPolicy: Never
        ports: [{ containerPort: 3002 }]
