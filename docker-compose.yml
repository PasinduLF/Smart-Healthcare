version: "3.8"

services:
  gateway:
    build: ./gateway
    ports:
      - "${PORT_GATEWAY}:${PORT_GATEWAY}"
    environment:
      - PORT=${PORT_GATEWAY}
      - PATIENT_SERVICE_URL=http://patient-service:${PORT_PATIENT}
      - DOCTOR_SERVICE_URL=http://doctor-service:${PORT_DOCTOR}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:${PORT_APPOINTMENT}
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:${PORT_TELEMEDICINE}
      - PAYMENT_SERVICE_URL=http://payment-service:${PORT_PAYMENT}
      - NOTIFICATION_SERVICE_URL=http://notification-service:${PORT_NOTIFICATION}
      - AI_SERVICE_URL=http://ai-service:${PORT_AI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - patient-service
      - doctor-service
      - appointment-service

  patient-service:
    build: ./patient-service
    ports:
      - "${PORT_PATIENT}:${PORT_PATIENT}"
    environment:
      - PORT=${PORT_PATIENT}
      - MONGO_URI=${MONGO_URI_BASE}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      
  doctor-service:
    build: ./doctor-service
    ports:
      - "${PORT_DOCTOR}:${PORT_DOCTOR}"
    environment:
      - PORT=${PORT_DOCTOR}
      - MONGO_URI=${MONGO_URI_BASE}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

  appointment-service:
    build: ./appointment-service
    ports:
      - "${PORT_APPOINTMENT}:${PORT_APPOINTMENT}"
    environment:
      - PORT=${PORT_APPOINTMENT}
      - MONGO_URI=${MONGO_URI_BASE}

  telemedicine-service:
    build: ./telemedicine-service
    ports:
      - "${PORT_TELEMEDICINE}:${PORT_TELEMEDICINE}"
    environment:
      - PORT=${PORT_TELEMEDICINE}

  payment-service:
    build: ./payment-service
    ports:
      - "${PORT_PAYMENT}:${PORT_PAYMENT}"
    environment:
      - PORT=${PORT_PAYMENT}
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - PAYHERE_NOTIFY_URL=${PAYHERE_NOTIFY_URL}

  notification-service:
    build: ./notification-service
    ports:
      - "${PORT_NOTIFICATION}:${PORT_NOTIFICATION}"
    environment:
      - PORT=${PORT_NOTIFICATION}

  ai-service:
    build: ./ai-service
    ports:
      - "${PORT_AI}:${PORT_AI}"
    environment:
      - PORT=${PORT_AI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=mongodb+srv://lpasindu30_db_user:SdSjcC0yYyX1JIwj@cluster0.gvxgnvm.mongodb.net${MONGO_URI_AI_SUFFIX}
